name: Generate Weekly Blog Post

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:      # Allows manual trigger from the GitHub Actions tab

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Generate blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="blog/${DATE}-${{ steps.generate.outputs.filename }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content/blog/
          git commit -m "blog: ${{ steps.generate.outputs.title }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "New post: ${{ steps.generate.outputs.title }}" \
            --body "Weekly blog post generated by Claude. Review the content and merge to publish to the site." \
            --base main \
            --head "$BRANCH"
